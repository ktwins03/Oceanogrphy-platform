
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코페르니쿠스 마린 레이어 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 지도 생성
    const map = L.map('map').setView([39.06, 130.16], 6);

    // 2. 기본 배경 지도 (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3. 코페르니쿠스 마린 WMS 레이어 추가
    // 주의: 아래 URL과 layer 명은 사용하시려는 특정 데이터셋에 맞게 수정해야 합니다.
    const copernicusWMS = L.tileLayer.wms("https://my.cmems-du.eu/motu-web/wms", {
        layers: 'cmems_mod_glo_phy_anfc_0.083deg_P1D-m_thetao', // 예시: 데이터셋 ID
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        attribution: "© Copernicus Marine Service"
    }).addTo(map);
</script>

</body>
</html>
